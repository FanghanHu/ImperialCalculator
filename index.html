<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Imperial Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
	<style>
        :root {
            --bg-1: #f1f7ff;
            --bg-2: #d8ecff;
            --panel: #ffffff;
            --ink: #1f2a44;
            --ink-soft: #5d6d8a;
            --accent: #0c7cd5;
            --accent-2: #14a1c9;
            --unit: #1f9d75;
            --operator: #c45508;
            --shadow: 0 20px 45px rgba(23, 45, 89, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: 'Space Grotesk', sans-serif;
            background:
                radial-gradient(circle at 15% 15%, #ffffff 0%, transparent 45%),
                linear-gradient(130deg, var(--bg-1), var(--bg-2));
            padding: 16px;
            color: var(--ink);
        }

        .calculator-shell {
            width: min(540px, 100%);
            background: var(--panel);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 20px;
            display: grid;
            gap: 18px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            margin: 0;
            font-size: clamp(1.2rem, 2.6vw, 1.8rem);
            letter-spacing: 0.02em;
        }

        .subtitle {
            margin: 4px 0 0;
            font-size: 0.9rem;
            color: var(--ink-soft);
        }

        .display-panel {
            background: linear-gradient(145deg, #f8fbff, #eef6ff);
            border: 1px solid #d7e8ff;
            border-radius: 18px;
            padding: 14px;
            display: grid;
            gap: 10px;
        }

        .display-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--ink-soft);
        }

        .expression-display {
            min-height: 32px;
            font-size: clamp(1rem, 3vw, 1.35rem);
            font-weight: 600;
            word-break: break-word;
        }

        .expression-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: center;
        }

        .toggle-units-btn {
            border: 1px solid #b8d8f6;
            border-radius: 10px;
            background: linear-gradient(145deg, #edf6ff, #dceeff);
            color: #0f4f84;
            font: inherit;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            padding: 8px 10px;
            cursor: pointer;
            transition: transform 0.12s ease, filter 0.2s ease;
        }

        .toggle-units-btn:hover {
            filter: brightness(1.03);
        }

        .toggle-units-btn:active {
            transform: translateY(1px) scale(0.99);
        }

        .result-display {
            min-height: 26px;
            font-size: clamp(0.95rem, 2.2vw, 1.1rem);
            color: var(--accent);
            font-weight: 700;
        }

        .result-display.error {
            color: #b42318;
        }

        .keypad-layout {
            display: grid;
            grid-template-columns: 3fr 1.3fr 1.2fr;
            gap: 12px;
        }

        .pad-block {
            background: #f8fbff;
            border: 1px solid #dce9fb;
            border-radius: 16px;
            padding: 12px;
        }

        .pad-title {
            margin: 0 0 10px;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--ink-soft);
        }

        .num-grid {
            display: grid;
            grid-template-columns: repeat(3, 72px);
            justify-content: center;
            gap: 8px;
        }

        .unit-grid,
        .operator-grid {
            display: grid;
            justify-content: center;
            gap: 8px;
        }

        .key {
            border: 0;
            border-radius: 12px;
            width: 72px;
            aspect-ratio: 1 / 1;
            padding: 0;
            display: grid;
            place-items: center;
            font: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.12s ease, filter 0.2s ease;
        }

        .key:hover {
            filter: brightness(1.04);
        }

        .key:active {
            transform: translateY(1px) scale(0.99);
        }

        .key.number {
            background: linear-gradient(145deg, #e5f0ff, #cbe3ff);
            color: #0f3568;
        }

        .key.unit {
            background: linear-gradient(145deg, #d2f5e7, #b3ebd8);
            color: #0e6146;
        }

        .key.operator {
            background: linear-gradient(145deg, #ffe5d0, #ffd2ad);
            color: #8f3f09;
        }

        .key.equals {
            background: linear-gradient(145deg, var(--accent), var(--accent-2));
            color: #ffffff;
        }

        .key.clear {
            background: #eff2f8;
            color: #36445f;
        }

        .key.back {
            background: #e9eef8;
            color: #2f3e5c;
            font-size: 1.1rem;
        }

        .key.clear-entry {
            background: #ffe7e0;
            color: #8b2e12;
        }

        .key.zero-wide {
            grid-column: span 2;
            width: 152px;
            aspect-ratio: auto;
        }

        #display {
            width: 100%;
            height: 132px;
            resize: none;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #dce9fb;
            font: inherit;
            font-size: 0.9rem;
            background: #fcfeff;
            color: var(--ink-soft);
        }

        #history-container {
            max-height: 100px;
            overflow-y: auto;
            padding-right: 4px;
        }

        #history-display {
            display: flex;
            min-height: 100px;
            flex-direction: column;
            justify-content: flex-end;
            font-size: 0.8rem;
            color: var(--ink-soft);
        }

        @media (max-width: 760px) {
            .keypad-layout {
                grid-template-columns: 1fr;
            }

            .unit-grid,
            .operator-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
	</style>
</head>
<body>
    <main class="calculator-shell" tabindex="0">
        <header class="header">
            <div>
                <h1 class="title">Imperial and Metric Calculator</h1>
                <p class="subtitle">Calculate in feet and inches, or mix it up with meters.</p>
            </div>
        </header>

        <section class="display-panel" aria-live="polite">
            <div id="history-container">
                <div id="history-display"></div>
            </div>
            <div class="expression-row">
                <div id="expressionDisplay" class="expression-display"></div>
                <button class="toggle-units-btn" id="toggleUnitsButton" type="button" title="Toggle units (feet and inches &lt;-> meters)">ft&in</button>
            </div>
        </section>

        <section class="keypad-layout">
            <div class="pad-block">
                <div class="num-grid">
                    <button class="key clear-entry" data-action="clear-entry">AC</button>
                    <button class="key clear" data-action="clear">C</button>
                    <button class="key back" data-action="back" aria-label="Backspace">&#x2190;</button>
                    <button class="key number" data-input="7">7</button>
                    <button class="key number" data-input="8">8</button>
                    <button class="key number" data-input="9">9</button>
                    <button class="key number" data-input="4">4</button>
                    <button class="key number" data-input="5">5</button>
                    <button class="key number" data-input="6">6</button>
                    <button class="key number" data-input="1">1</button>
                    <button class="key number" data-input="2">2</button>
                    <button class="key number" data-input="3">3</button>
                    <button class="key number zero-wide" data-input="0">0</button>
                    <button class="key number" data-input=".">.</button>
                </div>
            </div>

            <div class="pad-block">
                <div class="unit-grid">
                    <button class="key unit" data-input="'">ft '</button>
                    <button class="key unit" data-input='"'>in "</button>
                    <button class="key unit" data-input="m">m</button>
                </div>
            </div>

            <div class="pad-block">
                <div class="operator-grid">
                    <button class="key operator" data-input="+">+</button>
                    <button class="key operator" data-input="-">-</button>
                    <button class="key operator" data-input="*">×</button>
                    <button class="key operator" data-input="/">÷</button>
                    <button class="key equals" data-input="=">=</button>
                </div>
            </div>
        </section>

        <div id="operand1" hidden></div>
        <div id="operator" hidden></div>
        <div id="operand2" hidden></div>
    </main>

	<script type="module">
        import ImperialCalculator from './calculator.js';

        const imperialCalculator = new ImperialCalculator();

        window.imperialCalculator = imperialCalculator; //expose the calculator instance for testing and debugging

        const calculatorShell = document.querySelector('.calculator-shell');
        const expressionDisplay = document.getElementById('expressionDisplay');
        const toggleUnitsButton = document.getElementById('toggleUnitsButton');

        function getCapturedExpression() {
            const displayOperator = imperialCalculator.operator ? imperialCalculator.operator.replace('*', '×').replace('/', '÷') : '';

            const operand1Text = imperialCalculator.operandToString(imperialCalculator.operand1);
            const operatorText = displayOperator || '';
            const operand2Text = imperialCalculator.operandToString(imperialCalculator.operand2);
            return `${operand1Text} ${operatorText} ${operand2Text}`.trim();
        }

        function renderCaptureState() {
            const text = getCapturedExpression();
            expressionDisplay.textContent = text || 'Start entering a calculation...';
        }

        function renderResultUnitLabel() {
            toggleUnitsButton.textContent = imperialCalculator.resultUnit === 'meters' ? 'm' : 'ft&in';
        }

        function clearCalculator() {
            imperialCalculator.operand1 = [];
            imperialCalculator.operand2 = [];
            imperialCalculator.operator = null;
            expressionDisplay.textContent = 'Start entering a calculation...';
        }

        function clearAll() {
            clearCalculator();
            imperialCalculator.output = [];
            const historyDisplay = document.getElementById('history-display');
            historyDisplay.innerHTML = '';
        }

        function appendHistory(message) {
            const historyDisplay = document.getElementById('history-display');
            const div = document.createElement('div');
            div.textContent = message;
            historyDisplay.appendChild(div);

            const historyContainer = document.getElementById('history-container');
            historyContainer.scrollTop = historyContainer.scrollHeight;
        }

        function handleInputToken(token) {
            if (token === '=' || ['+', '-', '*', '/'].includes(token) && imperialCalculator.operand1.length && imperialCalculator.operand2.length && imperialCalculator.operator) {
                //calculate when the input is '=', or when the operator and operands are ready, and the user tries to put in another operator
                try {
                    const capturedExpression = getCapturedExpression();
                    const result = imperialCalculator.calculate();
                    //capture the result as the new operand1 for the next calculation
                    imperialCalculator.captureInput(result);
                    expressionDisplay.textContent = result;
                    appendHistory(`${capturedExpression} = ${result}`);
                } catch (error) {
                    appendHistory(`Error: ${error.message}`);
                }

                if(token === '=') {
                    //no need to capture input if the token is '='
                    return;
                }
            }

            imperialCalculator.captureInput(token);
            renderCaptureState();
        }

        calculatorShell.addEventListener('keydown', function(event) {
            const validKeys = ['+', '-', '*', '/', "'", '"', 'm', '.', '=', '^'];
            const isDigit = event.key >= '0' && event.key <= '9';
            if (isDigit || validKeys.includes(event.key) || event.key === 'Enter') {
                event.preventDefault();
                handleInputToken(event.key === 'Enter' ? '=' : event.key);
            } else if (event.key === 'Backspace') {
                event.preventDefault();
                imperialCalculator.handleBack();
                renderCaptureState();
            }
        });

        calculatorShell.addEventListener('paste', function(event) {
            const clipboardData = event.clipboardData;
            if (!clipboardData) {
                return;
            }

            const clipboardTypes = Array.from(clipboardData.types || []);
            if (!clipboardTypes.includes('text/plain')) {
                return;
            }

            const pastedText = clipboardData.getData('text/plain');
            if (pastedText.length > 100) {
                return;
            }
            
            event.preventDefault();
            imperialCalculator.captureInput(pastedText);
            renderCaptureState();
        });

        document.querySelectorAll('[data-input]').forEach(function(button) {
            button.addEventListener('click', function() {
                handleInputToken(button.dataset.input);
            });
        });

        document.querySelectorAll('[data-action="clear"]').forEach(function(button) {
            button.addEventListener('click', function() {
                clearCalculator();
            });
        });

        document.querySelectorAll('[data-action="clear-entry"]').forEach(function(button) {
            button.addEventListener('click', function() {
                clearAll();
            });
        });

        document.querySelectorAll('[data-action="back"]').forEach(function(button) {
            button.addEventListener('click', function() {
                imperialCalculator.handleBack();
                renderCaptureState();
            });
        });

        toggleUnitsButton.addEventListener('click', function() {
            //toggle to meters if any of the operands has feet or inches, otherwise toggle to feet and inches, if no units, do nothing
            const targetUnit = imperialCalculator.operand1.some(component => ['feet', 'inches'].includes(component.unit)) || imperialCalculator.operand2.some(component => ['feet', 'inches'].includes(component.unit)) ? 'meters' :
            imperialCalculator.operand1.some(component => component.unit === 'meters') || imperialCalculator.operand2.some(component => component.unit === 'meters') ? 'inches' : '';
            imperialCalculator.resultUnit = targetUnit; //set the target unit for displaying future results
            imperialCalculator.toggleOperandUnits([imperialCalculator.operand1, imperialCalculator.operand2], targetUnit);
            renderCaptureState();
            renderResultUnitLabel();
        });

        renderCaptureState();
        renderResultUnitLabel();
    </script>
</body>
</html>
